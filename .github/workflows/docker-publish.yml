name: Docker Build & Publish
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker-build-amd64:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd apps/web-dashboard
          npm install
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (AMD64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ github.repository_owner }}/antigravity-tools-ls:latest-amd64
            ${{ github.repository_owner }}/antigravity-tools-ls:${{ github.ref_name }}-amd64

  docker-build-arm64:
    runs-on: ubuntu-24.04-arm
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd apps/web-dashboard
          npm install
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ github.repository_owner }}/antigravity-tools-ls:latest-arm64
            ${{ github.repository_owner }}/antigravity-tools-ls:${{ github.ref_name }}-arm64

  docker-manifest:
    needs: [docker-build-amd64, docker-build-arm64]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create -t ${{ github.repository_owner }}/antigravity-tools-ls:latest \
            ${{ github.repository_owner }}/antigravity-tools-ls:latest-amd64 \
            ${{ github.repository_owner }}/antigravity-tools-ls:latest-arm64

          docker buildx imagetools create -t ${{ github.repository_owner }}/antigravity-tools-ls:${{ github.ref_name }} \
            ${{ github.repository_owner }}/antigravity-tools-ls:${{ github.ref_name }}-amd64 \
            ${{ github.repository_owner }}/antigravity-tools-ls:${{ github.ref_name }}-arm64
